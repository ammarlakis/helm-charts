name: Add Chart to Helm Repository

on:
  workflow_dispatch:
    inputs:
      repository:
        description: GitHub repository ID (e.g., username/reponame)
        required: true
        type: string
      release_name:
        description: Release name to fetch the chart artifact from.
        required: true
        type: string
      chart_asset:
        description: Exact Helm chart asset to download (e.g., paperless-wsd-bridge-0.1.6.tgz)
        required: true
        type: string

jobs:
  add-helm-chart:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download chart artifact
        id: downloaded_artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ inputs.repository }}
          RELEASE_NAME: ${{ inputs.release_name }}
          CHART_ASSET: ${{ inputs.chart_asset }}
        run: |
          if [[ "$CHART_ASSET" != *.tgz ]]; then
            echo "chart_asset must be a .tgz Helm chart package: $CHART_ASSET" >&2
            exit 1
          fi

          asset_url="$(gh release view "$RELEASE_NAME" --repo "$REPOSITORY" --json assets | jq -r --arg name "$CHART_ASSET" '.assets[] | select(.name == $name) | .url')"
          if [ -z "$asset_url" ] || [ "$asset_url" = "null" ]; then
            echo "Could not find chart asset '$CHART_ASSET' in release '$RELEASE_NAME' for $REPOSITORY" >&2
            exit 1
          fi

          gh release download "$RELEASE_NAME" --repo "$REPOSITORY" --pattern "$CHART_ASSET" --clobber
          if [ ! -f "$CHART_ASSET" ]; then
            echo "Chart asset '$CHART_ASSET' was not downloaded" >&2
            exit 1
          fi

          echo "name=$CHART_ASSET" >> "$GITHUB_OUTPUT"
          echo "url=$asset_url" >> "$GITHUB_OUTPUT"

      - name: Setup yq
        uses: dcarbone/install-yq-action@v1

      - name: Update index.yaml
        env:
          ASSET_NAME: ${{ steps.downloaded_artifacts.outputs.name }}
          ASSET_URL: ${{ steps.downloaded_artifacts.outputs.url }}
        run: |
          # Extract the chart metadata from the Chart.yaml inside the .tgz file
          asset_name="$ASSET_NAME"
          if [ -z "$asset_name" ]; then
            echo "Missing downloaded chart asset name" >&2
            exit 1
          fi
          if [ -z "$ASSET_URL" ]; then
            echo "Missing downloaded chart asset URL" >&2
            exit 1
          fi

          chart_dir="$(tar -tzf "$asset_name" | awk -F/ '$2 == "Chart.yaml" { print $1; exit }')"
          if [ -z "$chart_dir" ]; then
            echo "Could not find Chart.yaml in $asset_name" >&2
            exit 1
          fi

          tar -xOzf "$asset_name" "$chart_dir/Chart.yaml" > Chart.yaml
          chart_name="$(yq -r '.name' Chart.yaml)"
          if [ -z "$chart_name" ] || [ "$chart_name" = "null" ]; then
            echo "Could not read chart name from Chart.yaml in $asset_name" >&2
            exit 1
          fi

          # Create the helm chart
          created="$(date '+%Y-%m-%dT%H:%M:%S.%N%:z')"
          digest="$(sha256sum "$asset_name" | cut -d\  -f 1)"
          CREATED="$created" DIGEST="$digest" ASSET_URL="$ASSET_URL" yq '. += {"created": strenv(CREATED), "digest": strenv(DIGEST), "urls": [strenv(ASSET_URL)]}' -i Chart.yaml

          # Add the new chart entry to the index.yaml file
          CHART_NAME="$chart_name" yq '.entries[strenv(CHART_NAME)] += [load("Chart.yaml")]' -i index.yaml

          # Update generation date
          yq ".generated = \"$(date '+%Y-%m-%dT%H:%M:%S.%N%:z')\"" -i index.yaml

      - name: Render README from template
        uses: ammarlakis/action-gomplate@v1
        with:
          input_file: README.md.gotmpl
          output_file: README.md
          data_sources: "index=index.yaml"

      - name: Render HTML index from template
        uses: ammarlakis/action-gomplate@v1
        with:
          input_file: index.html.gotmpl
          output_file: index.html
          data_sources: "index=index.yaml"

      - name: Check for changes
        id: check_changes
        run: |
          git add index.yaml README.md index.html

          # Check if there are any changes to commit and set output accordingly
          if [ -n "$(git diff --cached)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure Git
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Commit changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git commit -m "Publishing ${{ steps.downloaded_artifacts.outputs.name }}"

      - name: Push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git push origin ${{ github.event.repository.default_branch }}

      - name: Prepare pages file
        run: |
          mkdir dist
          cp index.yaml index.html dist/

      - name: Upload index file as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  publish-pages:
    needs:
      - add-helm-chart
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
